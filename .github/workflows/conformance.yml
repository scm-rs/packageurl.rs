name: conformance

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    # Fail loudly if the submodule is missing rather than skipping the suite.
    env:
      PURL_CONFORMANCE_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --test purl_conformance
